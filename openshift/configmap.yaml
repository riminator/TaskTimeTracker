apiVersion: v1
kind: ConfigMap
metadata:
  name: timetracker-config
data:
  default-user-email: "user@company.com"
  default-project-code: "GENERAL"
  rounding-minutes: "15"
  min-meeting-duration: "5"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: timetracker-rules
data:
  tracking-rules.json: |
    {
      "classification": {
        "projectMapping": {
          "patterns": [
            {
              "pattern": "Project (\\w+)",
              "projectCodeGroup": 1,
              "taskType": "project-work"
            },
            {
              "pattern": "Sprint (Planning|Review|Retro)",
              "projectCode": "SCRUM",
              "taskType": "ceremony"
            },
            {
              "pattern": "(Daily Standup|Daily Scrum)",
              "projectCode": "SCRUM",
              "taskType": "standup"
            },
            {
              "pattern": "1:1|One on One",
              "projectCode": "ADMIN",
              "taskType": "one-on-one"
            }
          ],
          "organizerMapping": {},
          "channelMapping": {}
        },
        "exclusions": {
          "titlePatterns": [
            "Lunch",
            "Break",
            "OOO",
            "Out of Office",
            "Personal",
            "Blocked"
          ],
          "categories": [
            "Personal",
            "Holiday"
          ]
        },
        "billableRules": {
          "defaultBillable": false,
          "billablePatterns": [
            "Client",
            "Customer",
            "Consulting"
          ],
          "nonBillablePatterns": [
            "Internal",
            "Team",
            "Admin",
            "Training"
          ]
        }
      },
      "timeAllocation": {
        "roundingMinutes": 15,
        "minDurationMinutes": 5,
        "maxDurationMinutes": 480,
        "overlapHandling": "split-proportional",
        "lateJoinThresholdMinutes": 5,
        "earlyLeaveThresholdMinutes": 5
      },
      "confidence": {
        "thresholds": {
          "high": 0.8,
          "medium": 0.5,
          "low": 0.3
        },
        "weights": {
          "titleMatch": 0.4,
          "organizerMatch": 0.2,
          "attendeeMatch": 0.2,
          "channelMatch": 0.2
        }
      }
    }
  server-config.json: |
    {
      "server": {
        "name": "teams-timetracker-mcp",
        "version": "1.0.0",
        "description": "MCP server for syncing Microsoft Teams meetings to time tracking systems"
      },
      "capabilities": {
        "tools": true,
        "resources": true,
        "prompts": true
      },
      "security": {
        "requireApproval": true,
        "auditLog": true,
        "dryRunDefault": true
      },
      "features": {
        "autoClassification": true,
        "attendanceTracking": true,
        "overlapDetection": true,
        "confidenceScoring": true
      }
    }

# Made with Bob
