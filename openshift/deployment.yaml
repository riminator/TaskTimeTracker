apiVersion: apps/v1
kind: Deployment
metadata:
  name: teams-timetracker
  labels:
    app: teams-timetracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teams-timetracker
  template:
    metadata:
      labels:
        app: teams-timetracker
    spec:
      containers:
      - name: timetracker
        image: teams-timetracker:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: MICROSOFT_TENANT_ID
          valueFrom:
            secretKeyRef:
              name: timetracker-secrets
              key: tenant-id
              optional: true
        - name: MICROSOFT_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: timetracker-secrets
              key: client-id
              optional: true
        - name: MICROSOFT_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: timetracker-secrets
              key: client-secret
              optional: true
        - name: DEFAULT_USER_EMAIL
          valueFrom:
            configMapKeyRef:
              name: timetracker-config
              key: default-user-email
        - name: DEFAULT_PROJECT_CODE
          valueFrom:
            configMapKeyRef:
              name: timetracker-config
              key: default-project-code
        - name: ROUNDING_MINUTES
          valueFrom:
            configMapKeyRef:
              name: timetracker-config
              key: rounding-minutes
        - name: LOG_LEVEL
          value: "info"
        - name: LOG_FILE_PATH
          value: "/app/logs"
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
        - name: logs-volume
          mountPath: /app/logs
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - node
            - -e
            - "process.exit(0)"
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - node
            - -e
            - "process.exit(0)"
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: timetracker-data-pvc
      - name: logs-volume
        persistentVolumeClaim:
          claimName: timetracker-logs-pvc
      - name: config-volume
        configMap:
          name: timetracker-rules

