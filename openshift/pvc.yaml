apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timetracker-data-pvc
  labels:
    app: timetracker-web
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: ocs-storagecluster-ceph-rbd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timetracker-logs-pvc
  labels:
    app: timetracker-web
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
  storageClassName: ocs-storagecluster-ceph-rbd

